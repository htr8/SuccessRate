<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SuccessRate — retirement financial planning with Monte Carlo simulation. Project portfolio outcomes, optimize taxes, and plan with confidence. All data stays in your browser." />
    <meta name="theme-color" content="#0B1C30" />
    <meta property="og:title" content="SuccessRate — Will Your Money Last?" />
    <meta property="og:description" content="Monte Carlo retirement planning that runs entirely in your browser. No sign-up required for the demo." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://successrate.app/" />
    <meta property="og:image" content="https://successrate.app/images/og-card.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>SuccessRate — Will Your Money Last?</title>
    <link rel="icon" type="image/svg+xml" href="images/logo.svg" />
    <base href="/app/" />
    <link href="bootstrap.min.css" rel="stylesheet" />
    <link href="fontawesome.min.css" rel="stylesheet" />
    <link href="_content/Blazorise.Bootstrap5/blazorise.bootstrap5.css" rel="stylesheet" />
    <link href="app.css" rel="stylesheet" />
    <link href="landing.css" rel="stylesheet" />
    <style>
        /* Blazor mount point must fill viewport so height:100% in app.css works */
        #app { height: 100%; display: flex; flex-direction: column; }
    </style>
</head>
<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:#64748b">
            Loading SuccessRate...
        </div>
    </div>
    <div id="blazor-error-ui" style="display:none;background:#fef2f2;color:#dc2626;padding:12px;position:fixed;bottom:0;width:100%;text-align:center">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss" onclick="document.getElementById('blazor-error-ui').style.display='none'">Dismiss</a>
    </div>
    <script>
        // Browser file download helper for WebFileSaveService
        window.downloadFile = function(filename, bytes) {
            var blob = new Blob([new Uint8Array(bytes)], { type: 'application/octet-stream' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };
    </script>
    <script src="js/chart.umd.js"></script>
    <script>
        // Cross-origin isolation via service worker (required for SharedArrayBuffer / WASM threading).
        // GitHub Pages cannot set response headers, so the SW injects COOP/COEP on every fetch.
        // Only register when the threaded runtime is present (Release builds with WasmEnableThreads).
        // Debug builds are single-threaded and the SW's header injection breaks SRI integrity checks.
        // Detection: threaded builds include dotnet.native.worker.mjs; single-threaded builds don't.
        //
        // IMPORTANT: Blazor must NOT load until the SW state is correct. If a stale SW from a
        // previous threaded session is active during a non-threaded (Debug) build, it injects
        // COOP/COEP headers that make the browser select threaded assets (which don't exist),
        // causing SRI integrity failures. We resolve the SW state first, then load Blazor.
        (async function() {
            if ("serviceWorker" in navigator) {
                try {
                    var r = await fetch("_framework/dotnet.native.worker.mjs", { method: "HEAD" });
                    if (r.ok) {
                        // Threaded build — ensure SW is registered
                        await navigator.serviceWorker.register("coi-serviceworker.js");
                        if (!navigator.serviceWorker.controller) {
                            // First install — SW will post COI_RELOAD after activation
                            navigator.serviceWorker.addEventListener("message", e => {
                                if (e.data?.type === "COI_RELOAD") location.reload();
                            });
                            return; // Don't load Blazor yet; page will reload once SW activates
                        }
                    } else {
                        // Non-threaded build — unregister any stale SW, reload if one was active
                        var regs = await navigator.serviceWorker.getRegistrations();
                        var stale = regs.filter(r => r.active?.scriptURL?.includes("coi-serviceworker"));
                        if (stale.length > 0) {
                            await Promise.all(stale.map(r => r.unregister()));
                            location.reload(); // Reload without the SW so SRI checks pass
                            return;
                        }
                    }
                } catch(e) { /* fetch failed — proceed without SW */ }
            }
            // SW state is correct — safe to load Blazor
            var s = document.createElement("script");
            s.src = "_framework/blazor.webassembly.js";
            document.body.appendChild(s);
        })();
    </script>
</body>
</html>
